      <h1 id="Mysql"><a href="#Mysql" class="headerlink" title="Mysql"></a>Mysql</h1><ol>
<li>查看所有表表名和备注</li>
</ol>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">SELECT TABLE_NAME,</span><br><span class="line">       table_comment</span><br><span class="line">FROM `information_schema`.tables</span><br><span class="line">WHERE table_schema=&#x27;数据库名&#x27;</span><br></pre></td></tr></table></figure>

<ol start="2">
<li>查询某张表的字段和备注</li>
</ol>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">select column_name,</span><br><span class="line">column_comment </span><br><span class="line">from information_schema.columns </span><br><span class="line">where table_name =&#x27;表名&#x27;</span><br><span class="line">and table_schema=&#x27;数据库名&#x27;</span><br></pre></td></tr></table></figure>

<ol start="4">
<li>查看所有字段名称和备注</li>
</ol>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line">SELECT a.table_name,</span><br><span class="line">       a.column_name,</span><br><span class="line">       a.column_comment</span><br><span class="line">FROM information_schema.columns a,</span><br><span class="line">     `information_schema`.tables b</span><br><span class="line">WHERE a.table_name = b.table_name</span><br><span class="line">  AND a.table_schema = b.table_schema</span><br><span class="line">  AND a.table_schema=&#x27;数据库名&#x27;</span><br><span class="line">ORDER BY a.table_name,</span><br><span class="line">         a.ordinal_position;</span><br></pre></td></tr></table></figure>


<ol start="5">
<li>处理死锁问题<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line">SELECT * FROM INFORMATION_SCHEMA.INNODB_LOCK_WAITS; </span><br><span class="line">SHOW OPEN TABLES WHERE In_use &gt; 0;  //查询死锁</span><br><span class="line">SELECT * FROM information_schema.INNODB_TRX; //查询死锁id</span><br><span class="line">kill 33614 //杀死</span><br><span class="line"></span><br><span class="line">show processlist;</span><br><span class="line"></span><br><span class="line">SHOW ENGINE INNODB STATUS; //查询最近一次的死锁日志</span><br></pre></td></tr></table></figure></li>
</ol>
