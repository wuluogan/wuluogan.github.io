<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title> JS 生成二维码</title>
</head>

<body>
    内容：<input type="text" id="content" value="https://wlg.com" /> <br><br>
    尺寸：<input type="text" id="size" value="150"><br><br>
    背景：<input type="text" id="color" value="#fff"><br><br>
    前景：<input type="text" id="colorr" value="#000"><br><br>
    <button id="btn">生成二维码</button><br><br>
    <div id="qrcode"></div>
</body>
<!-- https://www.bootcdn.cn/qrcodejs/ -->
<script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script type="text/javascript">

    //声明变量啊~~
    let qrcode;
    let content;
    let size;
    let color;
    let colorr;
    // 设置点击事件
    document.getElementById("btn").onclick = function () {
        // 获取内容
        content = document.getElementById("content").value;
        // 获取尺寸
        size = document.getElementById("size").value;
        // 获取背景
        color = document.getElementById("color").value;
        // 获取前景
        colorr = document.getElementById("colorr").value;
        // 清除上一次的二维码
        if (qrcode) {
            qrcode.clear();
        }
        // 创建二维码
        qrcode = new QRCode(document.getElementById("qrcode"), {
            width: size,//设置宽高
            height: size,
            colorLight: color,
            colorDark: colorr,

        });
        qrcode.makeCode(document.getElementById("content").value);

    }

</script>

</html>
