<script>
    baguetteBox.run('.gallery', {
        // 配置参数
        buttons: Boolean,//是否显示导航按钮。
        noScrollbars: true,//是否在显示时隐藏滚动条。
        titleTag: true,//是否使用图片上的title属性作为图片标题
        async: true,//是否异步加载文件。
    });

    // 滚动事件处理函数
window.addEventListener('scroll', start);

function start() {
    // 获取所有的图片元素
    let images = document.querySelectorAll('.gallery img');
    for (let image of images) {
        if (!image.dataset.isLoaded && isShow(image)) {
            loadImg(image);
        }
    }
}

// 判断元素是否在窗口中可见
function isShow(image) {
    let rect = image.getBoundingClientRect();
    return rect.top <= window.innerHeight + window.pageYOffset;
}

// 加载图片
function loadImg(image) {
    image.src = image.dataset.src;
    image.dataset.isLoaded = 1;
}
</script>
