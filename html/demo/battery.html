<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>电池电量</title><style>body{height:100vh;display:flex;justify-content:center;align-items:center;position:relative}.kyb{font-family:monospace;font-size:3em;font-style:bold;align-items:center;position:absolute;top:85px}.battery{margin-top:10px;height:360px;width:180px;border:1px solid #000;border-radius:10px;position:relative}.battery::before{content:"";position:absolute;height:8px;width:16px;right:78px;transform:translate(0,-100%);background:#000;border-top-right-radius:5px;border-top-left-radius:5px}.level{font:2em sans-serif;text-align:center;height:100%;width:100%;position:absolute;bottom:0;background:#00b26a;border-radius:10px;transition:all .5s;display:flex;justify-content:center;align-items:center;box-shadow:inset 0 0 50px rgba(0,0,0,.5)}.text{color:#f0f8ff;font-size:18px}.level.charging{animation:charging 3s linear infinite;background-color:#69f;box-shadow:inset 0 0 50px rgba(0,0,0,.5)}@keyframes charging{100%{height:100%}0%{height:0%}}</style></head><body><span class="kyb">了解您的电池</span><div class="battery"><div class="level charging"><div class="text"></div></div></div><script>navigator?navigator.getBattery().then(e=>{console.table(e),Charging(e.charging),BatteryLevel(e.level),e.onCharging=()=>Charging(e.charging),e.onLevelChange=()=>BatteryLevel(e.level)}):alert("Sorry your browser dosen't support the navigator object");let level=document.querySelector(".level"),text=document.querySelector(".text");function Charging(e){e?(level.classList.add("charging"),text.innerHTML="Charging "):level.classList.remove("charging")}function BatteryLevel(e){text.append(100*e+"%"),level.style.height=100*e+"%"}</script></body></html>
