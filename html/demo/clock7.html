<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>滑动时钟</title></head><style>*{box-sizing:border-box;padding:0;margin:0}body{font-family:monospace;font-size:2rem;min-height:100vh;display:grid;overflow-y:hidden;place-items:center;background:linear-gradient(-45deg,#c4d2ef,#dfe6f6)}.hr,.min,.sec{display:grid;grid-template-columns:1fr 1fr;grid-gap:2rem;grid-row:1/2;align-items:start}.number{padding:.5em;width:4rem;height:4rem;display:grid;place-items:center;color:#f9fbfd;transition:all .5s .1s ease;border-radius:50%}.number.pop{color:#3e6ccb;font-weight:700;transform:scale(1.3);background-color:#dfe6f6;box-shadow:-10px -10px 20px -5px #f9fbfd,10px 10px 20px #a9bee8}.strip{transition:transform .5s ease-in-out;border-radius:8px;background-color:#dfe6f6;box-shadow:-10px -10px 20px -5px #f9fbfd,10px 10px 20px #a9bee8}.clock{display:grid;grid-template-columns:repeat(3,1fr);grid-gap:3rem;height:4rem;position:relative;padding:0 4rem}</style><body><div class="clock"><div class="hr"><div class="strip"><div class="number">0</div><div class="number">1</div><div class="number">2</div></div><div class="strip"><div class="number">0</div><div class="number">1</div><div class="number">2</div><div class="number">3</div><div class="number">4</div><div class="number">5</div><div class="number">6</div><div class="number">7</div><div class="number">8</div><div class="number">9</div></div></div><div class="min"><div class="strip"><div class="number">0</div><div class="number">1</div><div class="number">2</div><div class="number">3</div><div class="number">4</div><div class="number">5</div></div><div class="strip"><div class="number">0</div><div class="number">1</div><div class="number">2</div><div class="number">3</div><div class="number">4</div><div class="number">5</div><div class="number">6</div><div class="number">7</div><div class="number">8</div><div class="number">9</div></div></div><div class="sec"><div class="strip"><div class="number">0</div><div class="number">1</div><div class="number">2</div><div class="number">3</div><div class="number">4</div><div class="number">5</div></div><div class="strip"><div class="number">0</div><div class="number">1</div><div class="number">2</div><div class="number">3</div><div class="number">4</div><div class="number">5</div><div class="number">6</div><div class="number">7</div><div class="number">8</div><div class="number">9</div></div></div></div></body><script>const strips=[...document.querySelectorAll(".strip")],numberSize="4";function highlight(e,t){strips[e].querySelector(`.number:nth-of-type(${t+1})`).classList.add("pop"),setTimeout(()=>{strips[e].querySelector(`.number:nth-of-type(${t+1})`).classList.remove("pop")},950)}function stripSlider(e,t){var r=Math.floor(t/10),t=t%10;strips[e].style.transform=`translateY(${r*-numberSize}rem)`,highlight(e,r),strips[e+1].style.transform=`translateY(${t*-numberSize}rem)`,highlight(e+1,t)}setInterval(()=>{var e=new Date,t=e.getHours(),r=e.getMinutes(),e=e.getSeconds();stripSlider(0,t),stripSlider(2,r),stripSlider(4,e)},1e3)</script></html>
