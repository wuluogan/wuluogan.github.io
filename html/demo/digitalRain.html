<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>数字雨</title></head><style>body{margin:0;overflow:hidden}</style><body><canvas id="q"></canvas></body><script>const s=window.screen,w=q.width=s.width,h=q.height=s.height,ctx=q.getContext("2d"),p=Array(Math.floor(w/10)+1).fill(0),random=t=>t[Math.floor(Math.random()*t.length)],hex="0123456789ABCDEF".split("");setInterval(()=>{ctx.fillStyle="rgba(0,0,0,.05)",ctx.fillRect(0,0,w,h),ctx.fillStyle="#0f0",p.map((t,e)=>{ctx.fillText(random(hex),10*e,t),p[e]=t>=h||t>50+1e4*Math.random()?0:t+10})},1e3/30)</script></html>
