<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1"><title>刮刮乐</title></head><body><h1 style="text-align:center">刮刮乐</h1><div id="ggk"><div class="jp">不抽大嘴巴子</div><canvas id="canvas" width="400" height="100"></canvas></div></body><script>document.addEventListener("selectstart",function(t){t.preventDefault()});let ggkDom=document.querySelector("#ggk"),jp=document.querySelector(".jp"),canvas=document.querySelector("#canvas"),ctx=canvas.getContext("2d"),isDraw=(ctx.fillStyle="darkgray",ctx.fillRect(0,0,400,100),!1),arr=(canvas.onmousedown=function(){isDraw=!0},canvas.onmousemove=function(t){var e;isDraw&&(e=t.pageX-ggkDom.offsetLeft+ggkDom.offsetWidth/2,t=t.pageY-ggkDom.offsetTop,ctx.beginPath(),ctx.arc(e,t,30,0,2*Math.PI),ctx.globalCompositeOperation="destination-out",ctx.fill(),ctx.closePath())},document.onmouseup=function(){isDraw=!1},[{content:"一等奖：一个大嘴巴子",p:.1},{content:"二等奖：两个大嘴巴子",p:.2},{content:"三等奖：三个大嘴巴子",p:.3}]),sj=Math.random();sj<arr[0].p?jp.innerHTML=arr[0].content:sj<arr[1].p?jp.innerHTML=arr[1].content:sj<arr[2].p&&(jp.innerHTML=arr[2].content)</script><style>#ggk{width:400px;height:100px;position:relative;left:50%;transform:translate(-50%,0)}.jp,canvas{position:absolute;width:400px;height:100px;left:0;top:0;text-align:center;font-size:25px;line-height:100px;color:#ff1493}</style></html>
