<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>花瓣特效</title></head><style>body{background:#000;height:100vh;width:100vw;overflow:hidden}.petal{position:absolute;top:50%;left:50%;margin:-50px 0 0 -50px;width:150px;height:150px;border-radius:100% 0 100% 50%;--color:hsl(0, 60%, 50%);background:linear-gradient(-45deg,#000,var(--color));transition:transform .4s ease-out;mix-blend-mode:screen}</style><body><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div></body><script>const $petals=document.querySelectorAll(".petal");let color=0;const mouse={x:1,y:1},handleMouse=e=>{var o=e.clientX||e.touches[0].clientX,e=e.clientY||e.touches[0].clientY;mouse.x=o/window.innerWidth,mouse.y=e/window.innerHeight},lerp=(["mousemove","touchstart","touchmove"].forEach(e=>window.addEventListener(e,handleMouse)),(e,o,t)=>(1-t)*e+t*o),animate=()=>{$petals.forEach((e,o)=>{var o=o/$petals.length,t=48*Math.sin(o*Math.PI*2),s=48*-Math.cos(o*Math.PI*2),t=(color=lerp(color,360*mouse.y,.004),{transform:`translate(${t}px, ${s}px) rotate(${360*o+360*mouse.y}deg) scale(${.5+.5*mouse.x})`,borderRadius:`${50+50*mouse.y}% 0 ${50+50*mouse.x}% 50%`});Object.assign(e.style,t),e.style.setProperty("--color",`hsl(${Math.floor(color)}, 60%, 50%)`)}),requestAnimationFrame(animate)};animate()</script></html>
