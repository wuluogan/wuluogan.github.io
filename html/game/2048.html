<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>2048</title><style>a,abbr,acronym,address,applet,article,aside,audio,b,big,blockquote,body,canvas,caption,center,cite,code,dd,del,details,dfn,div,dl,dt,em,embed,fieldset,figcaption,figure,footer,form,h1,h2,h3,h4,h5,h6,header,hgroup,html,i,iframe,img,ins,kbd,label,legend,li,mark,menu,nav,object,ol,output,p,pre,q,ruby,s,samp,section,small,span,strike,strong,sub,summary,sup,table,tbody,td,tfoot,th,thead,time,tr,tt,u,ul,var,video{margin:0;padding:0;border:0;font-size:100%;font:inherit;vertical-align:baseline}article,aside,details,figcaption,figure,footer,header,hgroup,menu,nav,section{display:block}body{line-height:1}ol,ul{list-style:none}blockquote,q{quotes:none}blockquote:after,blockquote:before,q:after,q:before{content:'';content:none}table{border-collapse:collapse;border-spacing:0}:root{--blue:70,80,161;--pink:209,99,142}body{min-height:100vh;font-family:Viga,Arial,cursive;background:rgba(var(--blue),1);color:#fff}.container{max-width:1150px;min-height:100vh;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-direction:column}.fluid{display:flex;max-width:800px;justify-content:space-around;align-items:center;flex-direction:column}#canvas{background:rgba(var(--blue),1);margin-top:30px;box-sizing:border-box}h1{font-size:58px;color:#fff;margin-top:30px}.scores{width:50%;display:flex;flex-direction:column;justify-content:center;align-items:flex-end}.edits{min-width:500px;width:100%;display:flex;flex-direction:row;justify-content:space-between;align-content:center;margin-top:30px;font-size:24px}.set-size{width:100%;display:flex;justify-content:flex-start;align-items:center;flex-direction:row}.size-block{display:flex;flex-direction:column;width:50%;justify-content:center;align-items:flex-start}#bestScore,.btns{margin-top:15px}.size-block input{margin-left:10px;max-width:50px}#size{background:0 0;border:2px solid #fff;color:#fff;font-size:18px;padding:5px 8px 5px 5px;width:60px;outline:0;box-sizing:border-box;text-align:center}.lose,.start2{z-index:999;position:absolute;margin-top:15px;font-size:35px;display:none}.start2{display:block;min-width:150px;margin-top:200px;cursor:pointer}#canvas-block{position:relative;display:flex;justify-content:center;align-items:center}.btns{display:flex;flex-direction:row;justify-content:flex-start;align-items:center;cursor:pointer}.reset{margin-left:15px}</style></head><body><div class="container"><div class="fluid"><h1>2048</h1><div class="edits"><div class="size-block"><div class="set-size"><p id="size-title">格数:</p><input id="size" type="number" value="4"></div><div class="btns"><div class="btn start">开始</div><div class="btn reset">重置</div></div></div><div class="scores"><span id="score">分数: 0</span> <span id="bestScore">最佳得分: 0</span></div></div><div id="canvas-block"><div class="start2">&gt; 开始 &lt;</div><div class="lose">游戏结束!</div><canvas id="canvas" width="500" height="500"></canvas></div></div></div><script>class Cell{constructor(e,t,s){this.value=0,this.x=t*s+5*(t+1),this.y=e*s+5*(e+1)}}class Game{constructor(){this.canvas=document.getElementById("canvas"),this.ctx=this.canvas.getContext("2d"),this.sizeInput=document.getElementById("size"),this.startBtn=document.querySelector(".start"),this.startBtn2=document.querySelector(".start2"),this.scoreLabel=document.getElementById("score"),this.resetBtn=document.querySelector(".reset"),this.lessHtml=document.querySelector(".lose"),this.scoreValue=0,this.bestScore=document.getElementById("bestScore"),this.bestScoreValue=localStorage.getItem("score2048"),this.size=4,this.width=this.canvas.width/this.size-6,this.cells=[],this.fontSize=0,this.loss=!1,this.init(),this.initState()}init(){this.startBtn.addEventListener("click",()=>{this.publicEvent()}),this.resetBtn.addEventListener("click",()=>{this.scoreValue=0,this.canvas.style.opacity="1",this.loss=!1,this.lessHtml.style.display="none",this.bestScoreValue=localStorage.getItem("score2048"),this.scoreLabel.innerHTML="Score: "+ +this.scoreValue,this.startGame(),this.initScore()})}initState(){this.initStart(),this.initScore(),this.initEvent()}initStart(){this.canvas.style.display="none",this.startBtn2.addEventListener("click",()=>{this.publicEvent()})}publicEvent(){3<=this.sizeInput.value&&this.sizeInput.value<=10?(this.size=this.sizeInput.value,this.width=this.canvas.width/this.size-6,this.canvasClear(),this.startGame(),this.canvas.style.display="block",this.startBtn2.style.display="none"):alert("不在生成的区间内，无法开始游戏")}initScore(){null!==this.bestScoreValue||void 0!==this.bestScoreValue?this.bestScore.innerHTML="最佳得分: "+ +this.bestScoreValue:this.bestScore.innerHTML="最佳得分: 0"}initEvent(){document.addEventListener("keydown",e=>{if(!this.loss&&"block"===this.canvas.style.display){switch(e.key){case"ArrowUp":this.moveUp();break;case"ArrowDown":this.moveDown();break;case"ArrowLeft":this.moveLeft();break;case"ArrowRight":this.moveRight()}this.scoreLabel.innerHTML="分数: "+ +this.scoreValue}})}canvasClear(){this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height)}async startGame(){await this.createCells(),await this.drawAllCells(),await this.pasteNewCell(),await this.pasteNewCell()}async createCells(){for(let t=0;t<this.size;t++){this.cells[t]=[];for(let e=0;e<this.size;e++)this.cells[t][e]=new Cell(t,e,this.width)}console.log(this.cells)}async drawAllCells(){for(let t=0;t<this.size;t++)for(let e=0;e<this.size;e++)this.drawCell(this.cells[t][e])}moveArrow(e){return console.log("arraw",e),new Map([["ArrowUp",this.moveUp()][this.moveDown()],["ArrowLeft",this.moveLeft()],["ArrowRight",this.moveRight()]]).get(e)}async pasteNewCell(){let s=0;for(let t=0;t<this.size;t++)for(let e=0;e<this.size;e++)this.cells[t][e].value||s++;if(s)for(;;){var e=Math.floor(Math.random()*this.size),t=Math.floor(Math.random()*this.size);if(!this.cells[e][t].value)return this.cells[e][t].value=2*Math.ceil(2*Math.random()),void this.drawAllCells()}else this.finishGame()}finishGame(){var e=localStorage.getItem("score2048");console.log("currentScore",e,this.scoreValue),e<this.scoreValue&&localStorage.setItem("score2048",this.scoreValue),this.canvas.style.opacity="0.3",this.loss=!0,this.lessHtml.style.display="block"}drawCell(e){this.ctx.beginPath(),this.ctx.rect(e.x,e.y,this.width,this.width),this.ctx.fillStyle="#384081",this.ctx.fill(),e.value&&(this.ctx.fillStyle=""+this.cellColor(e.value),this.ctx.fill(),this.fontSize=this.width/2,this.ctx.font=this.fontSize+"px Viga",this.ctx.fillStyle="white",this.ctx.textAlign="center",this.ctx.fillText(e.value,e.x+this.width/2,e.y+this.width/1.5))}cellColor(e){return new Map([[0,"rgb(135,200,116)"],[2,"rgb(135,200,116)"],[4,"rgb(95,149,212)"],[8,"rgb(139,89,177)"],[16,"rgb(229,195,81)"],[32,"rgb(202,77,64)"],[64,"rgb(108,129,112)"],[128,"rgb(207,126,63)"],[256,"rgb(82,125,124)"],[512,"rgb(191,76,134)"],[1024,"rgb(119,41,92)"],[2048,"rgb(118,179,194)"],[4096,"rgb(52,63,79)"]]).get(e)||"rgba(70,80,161,0.8)"}moveUp(){let s;for(let t=0;t<this.size;t++)for(let e=1;e<this.size;e++)if(this.cells[e][t].value)for(s=e;1<s;){if(this.cells[s-1][t].value){if(this.cells[s][t].value!==this.cells[s-1][t].value)break;this.cells[s-1][t].value*=2,this.scoreValue+=this.cells[s-1][t].value,this.cells[s][t].value=0;break}this.cells[s-1][t].value=this.cells[s][t].value,this.cells[s][t].value=0,s--}this.pasteNewCell()}moveDown(){let s;for(let t=0;t<this.size;t++)for(let e=this.size-2;0<=e;e--)if(this.cells[e][t].value)for(s=e;s+1<this.size;){if(this.cells[s+1][t].value){if(this.cells[s][t].value!==this.cells[s+1][t].value)break;this.cells[s+1][t].value*=2,this.scoreValue+=this.cells[s+1][t].value,this.cells[s][t].value=0;break}this.cells[s+1][t].value=this.cells[s][t].value,this.cells[s][t].value=0,s++}this.pasteNewCell()}moveLeft(){let s;for(let t=0;t<this.size;t++)for(let e=1;e<this.size;e++)if(this.cells[t][e].value)for(s=e;0<=s-1;){if(this.cells[t][s-1].value){if(this.cells[t][s].value!==this.cells[t][s-1].value)break;this.cells[t][s-1].value*=2,this.scoreValue+=this.cells[t][s-1].value,this.cells[t][s].value=0;break}this.cells[t][s-1].value=this.cells[t][s].value,this.cells[t][s].value=0,s--}this.pasteNewCell()}moveRight(){let s;for(let t=0;t<this.size;t++)for(let e=this.size-2;0<=e;e--)if(this.cells[t][e].value)for(s=e;s+1<this.size;){if(this.cells[t][s+1].value){if(this.cells[t][s].value!==this.cells[t][s+1].value)break;this.cells[t][s+1].value*=2,this.scoreValue+=this.cells[t][s+1].value,this.cells[t][s].value=0;break}this.cells[t][s+1].value=this.cells[t][s].value,this.cells[t][s].value=0,s++}this.pasteNewCell()}}new Game</script></body></html>
