<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>打砖块</title><style>*{box-sizing:border-box}body{background-color:#0095dd;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Arial,Helvetica,sans-serif;min-height:100vh;margin:0}h1{font-size:45px;color:#fff}canvas{background:#f0f0f0;display:block;border-radius:5px}.btn{cursor:pointer;border:0;padding:10px 20px;background:#000;color:#fff;border-radius:5px}.btn:focus{outline:0}.btn:hover{background:#222}.btn:active{transform:scale(.98)}.rules-btn{position:absolute;top:30px;left:30px}.rules{position:absolute;top:0;left:0;background:#333;color:#fff;min-height:100vh;width:400px;padding:20px;line-height:1.5;transform:translateX(-400px);transition:transform 1s ease-in-out}.rules.show{transform:translateX(0)}</style></head><body><h1>打砖块</h1><button id="rules-btn" class="btn rules-btn">显示规则</button><div id="rules" class="rules"><h2>怎么玩：</h2><p>使用左右键移动球拍以将球弹起 并打破障碍。</p><p>如果你错过了球，你的分数和盖帽将重置。</p><button id="close-btn" class="btn">关闭</button></div><canvas id="canvas" width="800" height="600"></canvas><script>const rulesBtn=document.getElementById("rules-btn"),closeBtn=document.getElementById("close-btn"),rules=document.getElementById("rules"),canvas=document.getElementById("canvas"),ctx=canvas.getContext("2d");let score=0;const brickRowCount=9,brickColumnCount=5,delay=500,ball={x:canvas.width/2,y:canvas.height/2,size:10,speed:4,dx:4,dy:-4,visible:!0},paddle={x:canvas.width/2-40,y:canvas.height-20,w:80,h:10,speed:8,dx:0,visible:!0},brickInfo={w:70,h:20,padding:10,offsetX:45,offsetY:60,visible:!0},bricks=[];for(let e=0;e<brickRowCount;e++){bricks[e]=[];for(let l=0;l<brickColumnCount;l++){const c=e*(brickInfo.w+brickInfo.padding)+brickInfo.offsetX,d=l*(brickInfo.h+brickInfo.padding)+brickInfo.offsetY;bricks[e][l]={x:c,y:d,...brickInfo}}}function drawBall(){ctx.beginPath(),ctx.arc(ball.x,ball.y,ball.size,0,2*Math.PI),ctx.fillStyle=ball.visible?"#0095dd":"transparent",ctx.fill(),ctx.closePath()}function drawPaddle(){ctx.beginPath(),ctx.rect(paddle.x,paddle.y,paddle.w,paddle.h),ctx.fillStyle=paddle.visible?"#0095dd":"transparent",ctx.fill(),ctx.closePath()}function drawScore(){ctx.font="20px Arial",ctx.fillText("Score: "+score,canvas.width-100,30)}function drawBricks(){bricks.forEach(l=>{l.forEach(l=>{ctx.beginPath(),ctx.rect(l.x,l.y,l.w,l.h),ctx.fillStyle=l.visible?"#0095dd":"transparent",ctx.fill(),ctx.closePath()})})}function movePaddle(){paddle.x+=paddle.dx,paddle.x+paddle.w>canvas.width&&(paddle.x=canvas.width-paddle.w),paddle.x<0&&(paddle.x=0)}function moveBall(){ball.x+=ball.dx,ball.y+=ball.dy,(ball.x+ball.size>canvas.width||ball.x-ball.size<0)&&(ball.dx*=-1),(ball.y+ball.size>canvas.height||ball.y-ball.size<0)&&(ball.dy*=-1),ball.x-ball.size>paddle.x&&ball.x+ball.size<paddle.x+paddle.w&&ball.y+ball.size>paddle.y&&(ball.dy=-ball.speed),bricks.forEach(l=>{l.forEach(l=>{l.visible&&ball.x-ball.size>l.x&&ball.x+ball.size<l.x+l.w&&ball.y+ball.size>l.y&&ball.y-ball.size<l.y+l.h&&(ball.dy*=-1,l.visible=!1,increaseScore())})}),ball.y+ball.size>canvas.height&&(showAllBricks(),score=0)}function increaseScore(){++score%(brickRowCount*brickColumnCount)==0&&(ball.visible=!1,paddle.visible=!1,setTimeout(function(){showAllBricks(),score=0,paddle.x=canvas.width/2-40,paddle.y=canvas.height-20,ball.x=canvas.width/2,ball.y=canvas.height/2,ball.visible=!0,paddle.visible=!0},delay))}function showAllBricks(){bricks.forEach(l=>{l.forEach(l=>l.visible=!0)})}function draw(){ctx.clearRect(0,0,canvas.width,canvas.height),drawBall(),drawPaddle(),drawScore(),drawBricks()}function update(){movePaddle(),moveBall(),draw(),requestAnimationFrame(update)}function keyDown(l){"Right"===l.key||"ArrowRight"===l.key?paddle.dx=paddle.speed:"Left"!==l.key&&"ArrowLeft"!==l.key||(paddle.dx=-paddle.speed)}function keyUp(l){"Right"!==l.key&&"ArrowRight"!==l.key&&"Left"!==l.key&&"ArrowLeft"!==l.key||(paddle.dx=0)}update(),document.addEventListener("keydown",keyDown),document.addEventListener("keyup",keyUp),rulesBtn.addEventListener("click",()=>rules.classList.add("show")),closeBtn.addEventListener("click",()=>rules.classList.remove("show"))</script></body></html>
