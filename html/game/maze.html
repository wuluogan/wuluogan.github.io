<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>迷宫游戏</title><style>body{background-color:#555}canvas{position:absolute;top:calc(50% - 256px);left:calc(50% - 256px);box-shadow:0 0 2px #000}#win{position:absolute;top:calc(50% - 256px);left:calc(50% - 256px);background-color:rgba(0,0,0,.8);text-align:center;width:512px;padding-top:150px;height:362px;color:#eee;opacity:0;display:none;transition:opacity .5s}#win.showing{display:inline-block;opacity:1}#win,button,input{font:20px Helvetica}input{width:40px}button{padding:8px}</style></head><body><canvas id="c"></canvas><div id="win" class="showing"><p>新建游戏</p><p>宽 <input id="widthInput" type="number" value="33"></p><p>高 <input id="heightInput" type="number" value="33"></p><p><button id="beginButton">开始</button></p><p>操纵键盘上下左右</p><p></p></div><script>var s=c.width=c.height=512,ctx=c.getContext("2d"),w=33,h=33,maze=[],dirs=[{x:-2,y:0},{x:0,y:-2},{x:2,y:0},{x:0,y:2}],goal={};function genMaze(){for(var e=maze.length=0;e<w;++e){maze.push([]);for(var t=0;t<h;++t)maze[e].push(0)}var n={x:1,y:1},a=[],s={stackLen:0,cell:n};maze[1][1]=1;do{var i=[{x:n.x+dirs[0].x,y:n.y+dirs[0].y,i:0},{x:n.x+dirs[1].x,y:n.y+dirs[1].y,i:1},{x:n.x+dirs[2].x,y:n.y+dirs[2].y,i:2},{x:n.x+dirs[3].x,y:n.y+dirs[3].y,i:3}].filter(function(e){return 0<e.x&&e.x<w&&0<e.y&&e.y<h&&0===maze[e.x][e.y]})}while(0<i.length?(a.push(n),i=i[Math.random()*i.length|0],maze[(n.x+i.x)/2][(n.y+i.y)/2]=1,maze[(n=i).x][n.y]=1):(s.stackLen<a.length&&(s.stackLen=a.length,s.cell=n),a.pop(),n=a[a.length-1]),0<a.length);goal=s.cell}function renderMaze(){ctx.fillStyle="#222",ctx.fillRect(0,0,s,s);var e=Math.min(s/w,s/h);ctx.translate(s/2-w*e/2,s/2-h*e/2);for(var t=0;t<w;++t)for(var n=0;n<h;++n)ctx.fillStyle=maze[t][n]?"#eee":"#000",ctx.fillRect(t*e-.5,n*e-.5,e+1,e+1);ctx.fillStyle="#495",ctx.fillRect(goal.x*e+e/4,goal.y*e+e/4,e/2,e/2),ctx.fillStyle="#945",ctx.fillRect(player.x*e+e/4,player.y*e+e/4,e/2,e/2),ctx.translate(-(s/2-w*e/2),-(s/2-h*e/2))}var keys=[{codes:[37,72,65],pressed:!1},{codes:[38,75,87],pressed:!1},{codes:[39,76,68],pressed:!1},{codes:[40,74,83],pressed:!1}],lastInput=Date.now(),player={x:1,y:1};function anim(){window.requestAnimationFrame(anim),keys.map(function(e,t){e.pressed&&20<Date.now()-lastInput&&(e=player.x+dirs[t].x/2,t=player.y+dirs[t].y/2,maze[e][t])&&(player.x=e,player.y=t,lastInput=Date.now(),e===goal.x)&&t===goal.y&&win.classList.add("showing")}),renderMaze()}genMaze(),anim(),window.addEventListener("keydown",function(t){keys.map(function(e){-1<e.codes.indexOf(t.keyCode)&&(e.pressed=!0)})}),window.addEventListener("keyup",function(t){keys.map(function(e){-1<e.codes.indexOf(t.keyCode)&&(e.pressed=!1)})}),beginButton.addEventListener("click",function(){w=+widthInput.value,h=+heightInput.value,win.classList.remove("showing"),player.x=player.y=1,genMaze()})</script></body></html>
