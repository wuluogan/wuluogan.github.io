<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1"><title>md图片提取</title><style>body{font-family:Arial,sans-serif}.container{display:flex}.left-column{width:50%;padding:20px}.right-column{width:50%;padding:20px}textarea{width:100%;height:200px;padding:10px;font-size:16px;resize:none}button{padding:10px 20px;font-size:16px;background-color:#4caf50;color:#fff;border:none;cursor:pointer}</style></head><body><h1>内容转换页面</h1><div class="container"><div class="left-column"><label for="inputText">输入内容：</label> <textarea id="inputText"></textarea></div><div class="right-column"><label for="outputText">转换后的内容：</label> <textarea id="outputText" readonly="readonly"></textarea></div></div><button onclick="convert()">转换</button><script>function convert(){for(var e,t=document.getElementById("inputText").value,n=/!\[(.*?)\]\((https:\/\/(?!www.inoreader.com).*?)\)/g,u=[];null!==(e=n.exec(t));)u.push(e[2]);document.getElementById("outputText").value=u.join("\n")}</script></body></html>
