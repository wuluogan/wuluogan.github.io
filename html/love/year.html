<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>年度</title></head><body><div id="year" class="year"></div><h1>年度</h1><div id="countdown" class="countdown"><div class="time"><h2 id="days">00</h2><small>days</small></div><div class="time"><h2 id="hours">00</h2><small>hours</small></div><div class="time"><h2 id="minutes">00</h2><small>minutes</small></div><div class="time"><h2 id="seconds">00</h2><small>seconds</small></div></div><img src="./img/spinner.gif" alt="Loading..." id="loading" class="loading"></body><script>const days=document.getElementById("days"),hours=document.getElementById("hours"),minutes=document.getElementById("minutes"),seconds=document.getElementById("seconds"),countdown=document.getElementById("countdown"),year=document.getElementById("year"),loading=document.getElementById("loading"),currentYear=(new Date).getFullYear(),newYearTime=new Date(`January 01 ${currentYear+1} 00:00:00`);function updateCountdown(){var e=new Date,e=newYearTime-e,n=Math.floor(e/1e3/60/60/24),t=Math.floor(e/1e3/60/60)%24,o=Math.floor(e/1e3/60)%60,e=Math.floor(e/1e3)%60;days.innerHTML=n,hours.innerHTML=t<10?"0"+t:t,minutes.innerHTML=o<10?"0"+o:o,seconds.innerHTML=e<10?"0"+e:e}year.innerText=currentYear+1,setTimeout(()=>{loading.remove(),countdown.style.display="flex"},1e3),setInterval(updateCountdown,1e3)</script><style>@import url(https://fonts.googleapis.com/css?family=Lato&display=swap);*{box-sizing:border-box}body{background-image:url(https://images.unsplash.com/photo-1467810563316-b5476525c0f9?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=1349&q=80);background-repeat:no-repeat;background-size:cover;background-position:center center;height:100vh;color:#fff;font-family:Lato,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;margin:0;overflow:hidden}body::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,.5)}body *{z-index:1}h1{font-size:60px;margin:-80px 0 40px}.year{font-size:200px;z-index:-1;opacity:.2;position:absolute;bottom:20px;left:50%;transform:translateX(-50%)}.countdown{display:none;transform:scale(2)}.time{display:flex;flex-direction:column;align-items:center;justify-content:center;margin:15px}.time h2{margin:0 0 5px}@media (max-width:500px){h1{font-size:45px}.time{margin:5px}.time h2{font-size:12px;margin:0}.time small{font-size:10px}}</style></html>
