<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>音频录制</title><link rel="stylesheet" href="./css/index.css"></head><body><div style="margin-bottom:16px"><button id="btn_start" onclick="startRecording()">开始录制</button> <button id="btn_pause" disabled="disabled" onclick="pauseRecording()">暂停录制</button> <button id="btn_resume" disabled="disabled" onclick="resumeRecording()">继续录制</button> <button id="btn_stop" disabled="disabled" onclick="stopRecording()">停止录制</button></div><audio id="recordedAudio" controls></audio><script>let mediaStream,mediaRecorder,mediaRecorderBlobs=[];const btnStart=document.getElementById("btn_start"),btnPause=document.getElementById("btn_pause"),btnResume=document.getElementById("btn_resume"),btnStop=document.getElementById("btn_stop"),recordedAudio=document.getElementById("recordedAudio");async function startRecording(){try{mediaRecorderBlobs=[],mediaStream=await navigator.mediaDevices.getUserMedia({audio:!0}),(mediaRecorder=new MediaRecorder(mediaStream)).ondataavailable=e=>{0<e.data.size&&mediaRecorderBlobs.push(e.data)},mediaRecorder.onstop=()=>{var e=new Blob(mediaRecorderBlobs,{type:"audio/wav"}),e=URL.createObjectURL(e);recordedAudio.src=e},mediaRecorder.start(),btnStart.disabled=!0,btnStop.disabled=btnPause.disabled=!1}catch(e){console.error("无法获取音频流：",e)}}function pauseRecording(){mediaRecorder&&"recording"===mediaRecorder.state&&(mediaRecorder.pause(),btnResume.disabled=!1,btnPause.disabled=!0)}function resumeRecording(){mediaRecorder&&"paused"===mediaRecorder.state&&(mediaRecorder.resume(),btnResume.disabled=!0,btnPause.disabled=!1)}function stopRecording(){mediaRecorder&&"inactive"!==mediaRecorder.state&&(mediaRecorder.stop(),btnStart.disabled=!1,btnStop.disabled=btnPause.disabled=btnResume.disabled=!0)}</script></body></html>
