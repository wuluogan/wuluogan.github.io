<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="X-UA-Compatible" content="ie=edge"><title>问题卡片</title><style>*{box-sizing:border-box}body{background-color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;overflow:hidden;font-family:Lato,sans-serif}h1{position:relative}h1 button{position:absolute;right:0;transform:translate(120%,-50%);z-index:2}.btn{cursor:pointer;background-color:#fff;border:1px solid #aaa;border-radius:3px;font-size:14px;margin-top:20px;padding:10px 15px}.btn-small{font-size:12px;padding:5px 10px}.btn-ghost{border:0;background-color:transparent}.clear{position:absolute;bottom:30px;left:30px}.cards{perspective:1000px;position:relative;height:300px;width:500px;max-width:100%}.card{position:absolute;opacity:0;font-size:1.5em;top:0;left:0;height:100%;width:100%;transform:translateX(50%) rotateY(-10deg);transition:transform .4s ease,opacity .4s ease}.card.active{cursor:pointer;opacity:1;z-index:10;transform:translateX(0) rotateY(0)}.card.left{transform:translateX(-50%) rotateY(10deg)}.inner-card{box-shadow:0 1px 10px rgba(0,0,0,.3);border-radius:4px;height:100%;width:100%;position:relative;transform-style:preserve-3d;transition:transform .4s ease}.card.show-answer .inner-card{transform:rotateX(180deg)}.inner-card-back,.inner-card-front{backface-visibility:hidden;position:absolute;top:0;left:0;display:flex;align-items:center;justify-content:center;height:100%;width:100%;background:#fff}.inner-card-front{transform:rotateX(0);z-index:2}.inner-card-back{transform:rotateX(180deg)}.inner-card-back::after,.inner-card-front::after{content:'\f021  Flip';font-family:'Font Awesome 5 Free',Lato,sans-serif;position:absolute;top:10px;right:10px;font-weight:700;font-size:16px;color:#ddd}.navigation{display:flex;margin:20px 0}.navigation .nav-button{border:none;background-color:transparent;cursor:pointer;font-size:16px}.navigation p{margin:0 25px}.add-container{opacity:0;z-index:-1;background-color:#f0f0f0;border-top:2px solid #eee;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;position:absolute;top:0;bottom:0;width:100%;transition:.3s ease}.add-container.show{opacity:1;z-index:2}.add-container h3{margin:10px 0}.form-group label{display:block;margin:20px 0 10px}.form-group textarea{border:1px solid #aaa;border-radius:3px;font-size:16px;padding:12px;min-width:500px;max-width:100%}</style></head><body><button id="clear" class="clear btn">- 清除卡片</button><h1>Memory Cards <button id="show" class="btn btn-small">+ 添加新卡</button></h1><div id="cards-container" class="cards"></div><div class="navigation"><button id="prev" class="nav-button">&lt</button><p id="current"></p><button id="next" class="nav-button">&gt</button></div><div id="add-container" class="add-container"><h1>添加新卡 <button id="hide" class="btn btn-small btn-ghost">x</button></h1><div class="form-group"><label for="question">问题</label> <textarea id="question" placeholder="Enter question..."></textarea></div><div class="form-group"><label for="answer">回答</label> <textarea id="answer" placeholder="Enter Answer..."></textarea></div><button id="add-card" class="btn">+ 添加卡</button></div><script>const cardsContainer=document.getElementById("cards-container"),prevBtn=document.getElementById("prev"),nextBtn=document.getElementById("next"),currentEl=document.getElementById("current"),showBtn=document.getElementById("show"),hideBtn=document.getElementById("hide"),questionEl=document.getElementById("question"),answerEl=document.getElementById("answer"),addCardBtn=document.getElementById("add-card"),clearBtn=document.getElementById("clear"),addContainer=document.getElementById("add-container");let currentActiveCard=0;const cardsEl=[],cardsData=getCardsData();function createCards(){cardsData.forEach((e,t)=>createCard(e,t))}function createCard(e,t){const a=document.createElement("div");a.classList.add("card"),0===t&&a.classList.add("active"),a.innerHTML=`
  <div class="inner-card">
  <div class="inner-card-front">
    <p>
      ${e.question}
    </p>
  </div>
  <div class="inner-card-back">
    <p>
      ${e.answer}
    </p>
  </div>
</div>
  `,a.addEventListener("click",()=>a.classList.toggle("show-answer")),cardsEl.push(a),cardsContainer.appendChild(a),updateCurrentText()}function updateCurrentText(){currentEl.innerText=currentActiveCard+1+"/"+cardsEl.length}function getCardsData(){var e=JSON.parse(localStorage.getItem("cards"));return null===e?[]:e}function setCardsData(e){localStorage.setItem("cards",JSON.stringify(e)),window.location.reload()}createCards(),nextBtn.addEventListener("click",()=>{cardsEl[currentActiveCard].className="card left",(currentActiveCard+=1)>cardsEl.length-1&&(currentActiveCard=cardsEl.length-1),cardsEl[currentActiveCard].className="card active",updateCurrentText()}),prevBtn.addEventListener("click",()=>{cardsEl[currentActiveCard].className="card right",(currentActiveCard-=1)<0&&(currentActiveCard=0),cardsEl[currentActiveCard].className="card active",updateCurrentText()}),showBtn.addEventListener("click",()=>addContainer.classList.add("show")),hideBtn.addEventListener("click",()=>addContainer.classList.remove("show")),addCardBtn.addEventListener("click",()=>{var e=questionEl.value,t=answerEl.value;e.trim()&&t.trim()&&(createCard(e={question:e,answer:t}),questionEl.value="",answerEl.value="",addContainer.classList.remove("show"),cardsData.push(e),setCardsData(cardsData))}),clearBtn.addEventListener("click",()=>{localStorage.clear(),cardsContainer.innerHTML="",window.location.reload()})</script></body></html>
