<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>快递查询工具</title><style>body{font-family:Arial,sans-serif}.container{margin:20px auto;max-width:600px;padding:20px;border:1px solid #ccc;background-color:#f5f5f5;border-radius:5px}h1{text-align:center}form{display:flex;justify-content:center;margin-bottom:20px}input[type=text]{width:300px;padding:10px;font-size:16px;border:1px solid #ccc;border-radius:4px}input[type=submit]{padding:10px 20px;font-size:16px;background-color:#4285f4;color:#fff;border:none;border-radius:4px;cursor:pointer}.result{margin-top:20px;background-color:#fff;padding:20px;border-radius:4px}.error-message{color:red;font-weight:700;text-align:center}.success-message{color:green;font-weight:700;text-align:center}table{width:100%;border-collapse:collapse}td,th{padding:10px;text-align:left;border-bottom:1px solid #ccc}</style></head><body><div class="container"><h1>快递查询工具</h1><form id="track-form"><input type="text" id="tracking-number" placeholder="请输入快递号"> <input type="submit" value="查询"></form><div id="result-container"></div></div><script>var trackForm=document.getElementById("track-form"),trackingNumberInput=document.getElementById("tracking-number"),resultContainer=document.getElementById("result-container");function getResult(e){fetch("https://api.vvhan.com/api/kuaidi?hao="+e).then(function(e){return e.json()}).then(function(e){e.success?showSuccess(e):showError("查询失败，请确认快递号是否正确")}).catch(function(e){console.error(e),showError("查询失败，请检查网络连接")})}function showSuccess(e){resultContainer.innerHTML="";var o=document.createElement("table"),t=document.createElement("tr"),n=document.createElement("th"),r=document.createElement("th");n.textContent="时间",r.textContent="状态",t.appendChild(n),t.appendChild(r),o.appendChild(t),e.info.forEach(function(e){var t=document.createElement("tr"),n=document.createElement("td"),r=document.createElement("td");n.textContent=e.time,r.textContent=e.context,t.appendChild(n),t.appendChild(r),o.appendChild(t)}),resultContainer.appendChild(o)}function showError(e){resultContainer.innerHTML="";var t=document.createElement("div");t.classList.add("error-message"),t.textContent=e,resultContainer.appendChild(t)}trackForm.addEventListener("submit",function(e){e.preventDefault();e=trackingNumberInput.value.trim();""===e?showError("请输入快递号"):getResult(e)})</script></body></html>
