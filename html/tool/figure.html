<!DOCTYPE html><html lang="en"><head><title>身材计算</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head><body><div class="wrapper"><div style="text-align:center"><h1>身材计算</h1></div><div class="input-data"><input id="nfz-height" type="text" required=""><div class="underline"></div><label>请输入身高（cm）</label></div><div class="input-data"><input id="nfz-weight" type="text" required=""><div class="underline"></div><label>请输入体重（kg）</label></div><div class="anpai-sumbit"><span class="anpai-a" onclick="anpaiSumbit()">身材算一算</span> <span class="anpai-a" onclick="anpaiReset()">清空</span></div></div><div class="modal-dialog" id="modal-dialog"><div class="modal-header"><h2 id="modal-title">提示框标题</h2><span class="btn-close" onclick="closeModal()">×</span></div><div class="modal-body"><p id="modal-content">内容</p></div><div class="modal-footer"><span class="btn" onclick="closeModal()">确定</span></div></div></body><script type="text/javascript">function closeModal(){document.getElementById("modal-dialog").style.display=""}function anpaiSumbit(){var e=document.getElementById("nfz-height").value,t=document.getElementById("nfz-weight").value;checkHeight(e)&&checkWeight(t)&&showModalMsg("计算成功","你的BMI为："+(e=getBMI(parseFloat(e),parseFloat(t)))+"<br>你的体重"+(e<18.5?"偏低，多吃点长身体":e<24?"正常，要继续保持哦！":e<28?"偏重，该减减体重啦！":"过重，答应我一定减！")+"<br><span class='anpai-tips'>(注意：身高单位是cm，体重单位是kg.)</span>")}function showModalMsg(e,t){document.getElementById("modal-title").innerText=e,document.getElementById("modal-content").innerHTML=t,document.getElementById("modal-dialog").style.display="block"}function isNumber(e){return!isNaN(parseFloat(e))&&isFinite(e)}function anpaiReset(){var e=document.getElementById("nfz-height"),t=document.getElementById("nfz-weight");e.value="",t.value=""}function getBMI(e,t){return(t/(e/=100)/e).toFixed(1)}function checkHeight(e){return!!isNumber(e)||(showModalMsg("计算错误","请检查所输入的身高（单位：cm）"),!1)}function checkWeight(e){return!!isNumber(e)||(showModalMsg("计算错误","请检查所输入的体重（单位：kg）"),!1)}</script><style type="text/css">.anpai-tips{font-size:small;color:#aaa}.anpai-sumbit{text-align:center;margin-top:32px;height:40px}.anpai-a{cursor:pointer;text-decoration:none;background:#2f435e;color:#f2f2f2;padding:10px 30px 10px 30px;font-size:16px;font-family:微软雅黑,宋体,Arial,Helvetica,Verdana,sans-serif;font-weight:700;border-radius:3px;-webkit-transition:all linear .3s;-moz-transition:all linear .3s;transition:all linear .3s}.anpai-a:hover{background:#385f9e}.btn{cursor:pointer;background:#428bca;border:#357ebd solid 1px;border-radius:3px;color:#fff;display:inline-block;font-size:14px;padding:8px 15px;text-decoration:none;text-align:center;min-width:60px;position:relative;transition:color .1s ease}.btn:hover{background:#357ebd}.btn-close{cursor:pointer;color:#aaa;font-size:30px;text-decoration:none;position:absolute;right:5px;top:0}.btn-close:hover{color:#919191}.modal-dialog{display:none;background:#fefefe;border:#333 solid 1px;border-radius:5px;margin-left:-180px;margin-top:-50px;position:fixed;left:50%;top:50%;z-index:11;width:360px}.modal-body{padding:20px}.modal-footer,.modal-header{padding:10px 20px}.modal-header{border-bottom:#eee solid 1px}.modal-header h2{font-size:20px}.modal-footer{border-top:#eee solid 1px;text-align:right}*{margin:0;padding:0;outline:0;box-sizing:border-box}body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(-135deg,#c850c0,#4158d0)}.wrapper{width:450px;background-color:#fff;padding:30px;box-shadow:0 0 10px rgba(0,0,0,.1)}.wrapper .input-data{margin-top:20px;width:100%;height:40px;position:relative}.wrapper .input-data input{width:100%;height:100%;border:none;border-bottom:2px solid silver;font-size:17px}.input-data input:focus~label,.input-data input:valid~label{transform:translateY(-20px);font-size:15px;color:#4158d0}.wrapper .input-data label{position:absolute;bottom:10px;left:0;color:grey;pointer-events:none;transition:all .3s ease}.wrapper .input-data .underline{position:absolute;bottom:0;height:2px;width:100%}.input-data .underline:before{position:absolute;content:"";height:100%;width:100%;background:#4158d0;transform:scaleX(0);transition:transform .3s ease}.input-data input:focus~.underline:before,.input-data input:valid~.underline:before{transform:scaleX(1)}</style></html>
