<!DOCTYPE html><html><head><title>番茄时钟</title><meta charset="UTF-8"><style>body{background-color:#fdf5e6;font-family:Arial,sans-serif;color:sienna;text-align:center}h1{margin-top:50px;font-size:36px;font-weight:700}#timer{margin-top:30px;font-size:48px;font-weight:700}button{padding:10px 20px;font-size:18px;border-radius:10px;border:none;margin-bottom:20px;background-color:sienna;color:#fff;cursor:pointer}input[type=number]{padding:10px;font-size:18px;border-radius:10px;border:none;margin:10px}</style></head><body><h1>番茄时钟</h1><div>工作时间（分钟）：<input type="number" id="workTime" min="1" value="25"> 休息时间（分钟）：<input type="number" id="breakTime" min="1" value="5"></div><button onclick="startWork()">开始工作</button><div id="timer">25:00</div><script>let workTotalTime=1500,breakTotalTime=300,timer,isWorking=!1;const startWork=()=>{var e=document.getElementById("workTime").value,t=document.getElementById("breakTime").value;0<e&&(workTotalTime=60*e),0<t&&(breakTotalTime=60*t),document.querySelector("body").requestFullscreen(),displayTime(workTotalTime),isWorking=!0,timer=setInterval(()=>{isWorking?--workTotalTime<=0?(clearInterval(timer),startBreak()):displayTime(workTotalTime):--breakTotalTime<=0?(clearInterval(timer),document.querySelector("body").exitFullscreen(),alert("休息时间结束！")):displayTime(breakTotalTime)},1e3)},startBreak=()=>{displayTime(breakTotalTime),isWorking=!1,timer=setInterval(()=>{breakTotalTime<=0?(clearInterval(timer),startWork()):(breakTotalTime--,displayTime(breakTotalTime))},1e3)},displayTime=e=>{var t=Math.floor(e/60).toString().padStart(2,"0"),e=(e%60).toString().padStart(2,"0");document.getElementById("timer").innerHTML=t+":"+e}</script></body></html>
