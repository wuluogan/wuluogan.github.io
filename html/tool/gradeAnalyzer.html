<!DOCTYPE html><html><head><title>成绩分析器</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.16.9/xlsx.full.min.js"></script><style>body{font-family:Arial,"Helvetica Neue",Helvetica,sans-serif;background-color:#f2f2f2}.container{width:800px;margin:20px auto;padding:20px;background-color:#fff;border-radius:6px;box-shadow:0 2px 10px rgba(0,0,0,.3)}h1{font-size:36px;font-weight:700;color:#333;margin-bottom:20px;text-align:center}.upload-container{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;border:2px dashed #ccc;border-radius:6px;margin-bottom:20px}.upload-icon{font-size:48px;color:#ccc}.upload-text{font-size:18px;color:#666;margin-top:10px}table{width:100%;border-collapse:collapse;margin-bottom:20px}th{background-color:#008cba;color:#fff;padding:10px}td{text-align:center;padding:10px;border:1px solid #ccc}td:first-child,th:first-child{position:sticky;left:0;background-color:#f2f2f2;z-index:1}td:last-child,th:last-child{background-color:#f2f2f2}tr:last-child td{font-weight:700}form{display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:20px}input[type=number]{width:60px;margin-right:10px;text-align:center;vertical-align:middle}input[type=submit]{padding:8px 16px;font-size:16px;background-color:#008cba;color:#fff;border:none;border-radius:4px;cursor:pointer}input[type=submit]:hover{background-color:#0077a3}.export-btn{display:inline-block;padding:8px 16px;font-size:16px;background-color:#008cba;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-left:10px}.export-btn:hover{background-color:#0077a3}</style></head><body><div class="container"><h1>成绩分析系统</h1><div><label for="full-score-input">满分：</label> <input type="number" id="full-score-input" min="1" max="100" step="1" value="100"></div><form id="input-form"><div><label for="score-input">成绩：</label> <input type="number" id="score-input" min="0" max="100" step="1" required></div><div><label for="name-input">姓名：</label> <input type="text" id="name-input" required></div><input type="submit" value="分析"></form><table id="result-table" style="display:none"></table><button class="export-btn" onclick="exportTable()">导出表格</button></div><script>var fullScoreInput=document.getElementById("full-score-input"),inputForm=document.getElementById("input-form"),resultTable=document.getElementById("result-table"),rows=[];function showResult(t,e){for(var r=["姓名","成绩","得分率"],d=t.length,n=r.length,a=0,l=-1/0,o=1/0,u=0;u<d;u++){var s=t[u];a+=h=parseInt(s[1]),l=Math.max(l,h),o=Math.min(o,h)}for(var i=a/d,p=0,u=0;u<d;u++){s=t[u];60<=(h=parseInt(s[1]))&&p++}var m=(m=p/d*100).toFixed(2),v="";v+="<tr>";for(u=0;u<n;u++)v+="<th>"+r[u]+"</th>";v+="</tr>";for(u=0;u<d;u++)var h,s=t[u],f=(f=(h=parseInt(s[1]))/parseInt(s[2])*100).toFixed(2),v=(v=(v=(v+="<tr>")+("<td>"+s[0]+"</td>"))+("<td>"+s[1]+"</td>"))+("<td>"+f+"%</td>")+"</tr>";v=(v+="<tr><td>平均分：</td>")+"<td>"+i.toFixed(2)+"</td>",resultTable.innerHTML=v=(v=(v=(v=(v=(v=(v=(v=(v+="<td></td>")+"</tr>"+"<tr>")+"<td>最高分：</td>"+("<td>"+l+"</td>"))+"<td></td>"+"</tr>")+"<tr>"+"<td>最低分：</td>")+("<td>"+o+"</td>")+"<td></td>")+"</tr>"+"<tr>")+"<td>及格率：</td>"+("<td>"+m+"%</td>"))+"<td></td>"+"</tr>",resultTable.style.display="table"}function exportTable(){for(var t=[["姓名","成绩","得分率"]],e=0;e<rows.length;e++){var r=rows[e],d=r[0],n=r[1],r=(r=n/r[2]*100).toFixed(2);t.push([d,n,r+"%"])}var a=XLSX.utils.aoa_to_sheet(t,{header:1}),l=XLSX.utils.book_new();XLSX.utils.book_append_sheet(l,a,"Sheet1"),XLSX.writeFile(l,"成绩表.xlsx")}inputForm.addEventListener("submit",function(t){t.preventDefault();var t=document.getElementById("score-input"),e=document.getElementById("name-input"),r=parseInt(t.value),d=e.value,n=parseInt(fullScoreInput.value);isNaN(r)||""===d||(rows.push([d,r,n]),showResult(rows,n),t.value="",e.value="")})</script></body></html>
