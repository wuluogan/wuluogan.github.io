<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1"><title>加密解密工具</title><style>body{font-family:Arial,sans-serif;background-color:#f0f0f0}h2{color:#333;margin-bottom:20px}input[type=text]{padding:10px;font-size:16px;width:300px;border:1px solid #ccc;border-radius:5px}button{padding:10px 20px;font-size:16px;background-color:#4caf50;color:#fff;border:none;border-radius:5px;cursor:pointer;margin-right:10px}button:hover{background-color:#45a049}p#result{padding:10px;font-size:16px;background-color:#fff;border:1px solid #ccc;border-radius:5px;width:300px;min-height:50px}</style><script>const LIST_CODE_EN=["富","强","文","明","平","等"],LIST_CODE_NUM=["中","华","人","民","共","和","国","万","岁","红"],LIST_HEX=["a","b","c","d","e","f"];function encode(n){return doInString(stringToHex(n=urlEncode(n)))}function decode(t){try{var e=[];for(let n=0;n<t.length;n++)-1!=findInNum(t.charAt(n))?e.push(findInNum(t.charAt(n))):-1!=findInEn(t.charAt(n))&&e.push(LIST_HEX[findInEn(t.charAt(n))]);return""===e.join("")||null===e.join("")?"解密失败非密文":urlDecode(hexToString(e.join("")))}catch(n){return"解密失败非密文"}}function stringToHex(t){var e=[];for(let n=0;n<t.length;n++){var r=t.charCodeAt(n).toString(16);e.push(r)}return e.join("")}function hexToString(t){let e="";for(let n=0;n<t.length;n+=2){var r=t.substr(n,2),r=String.fromCharCode(parseInt(r,16));e+=r}return e}function doInString(t){var e=[];for(let n=0;n<t.length;n++)/^\d$/.test(t.charAt(n))?e.push(LIST_CODE_NUM[parseInt(t.charAt(n))]):e.push(LIST_CODE_EN[enToInt(t.charAt(n))-1]);return e.join("")}function isNum(n){return/^\d$/.test(n)}function enToInt(n){n=n.toString().charCodeAt(0);let t=65<=n&&n<=90?n-64:97<=n&&n<=122?n-96:0;return t}function findInEn(n){var t=n.toString();for(let n=0;n<LIST_CODE_EN.length;n++)if(LIST_CODE_EN[n]===t)return n;return-1}function findInNum(n){var t=n.toString();for(let n=0;n<LIST_CODE_NUM.length;n++)if(LIST_CODE_NUM[n]===t)return n;return-1}function urlEncode(t){try{return encodeURIComponent(t)}catch(n){return console.error(n),t}}function urlDecode(t){try{return decodeURIComponent(t)}catch(n){return console.error(n),t}}function encrypt(){var n=encode(document.getElementById("inputText").value);document.getElementById("result").innerHTML=n}function decrypt(){var n=decode(document.getElementById("inputText").value);document.getElementById("result").innerHTML=n}</script></head><body><h2>红色加密解密工具</h2><input type="text" id="inputText"> <button onclick="encrypt()">加密</button> <button onclick="decrypt()">解密</button><p id="result"></p></body></html>
