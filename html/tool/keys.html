<!DOCTYPE html><html lang="en"><head><title>键盘对应</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>*{box-sizing:border-box}body{background-color:#e1e1e1;font-family:Muli,sans-serif;display:flex;align-items:center;justify-content:center;text-align:center;height:100vh;overflow:hidden;margin:0}.key{border:1px solid #999;background-color:#eee;box-shadow:1px 1px 3px rgba(0,0,0,.1);display:inline-flex;align-items:center;font-size:20px;font-weight:700;padding:20px;flex-direction:column;margin:10px;min-width:150px;position:relative}.key small{position:absolute;top:-24px;left:0;text-align:center;width:100%;color:#555;font-size:14px}@media(max-width:768px){.key{margin:10px 0}}</style></head><body><div id="insert"><div class="key">按任意键获取keyCode</div></div><script>const insert=document.getElementById("insert");window.addEventListener("keydown",e=>{insert.innerHTML=`
        <div class="key">
        ${" "===e.key?"Space":e.key} 
        <small>event.key</small>
        </div>
        <div class="key">
        ${e.keyCode}
        <small>event.keyCode</small>
        </div>
        <div class="key">
        ${e.code}
        <small>event.code</small>
        </div>
        `})</script></body></html>
