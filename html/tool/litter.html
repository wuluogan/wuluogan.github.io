<!DOCTYPE html><html><head><meta charset="UTF-8"><title>垃圾分类查询</title></head><body><h1>垃圾分类查询</h1><form id="trashForm"><input type="text" id="inputTrash" placeholder="请输入垃圾名称"> <button type="submit">查询</button></form><div id="resultContainer" class="result-container"></div></body><script>document.addEventListener("DOMContentLoaded",function(){var e=document.getElementById("trashForm"),t=document.getElementById("inputTrash"),n=document.getElementById("resultContainer");e.addEventListener("submit",function(e){e.preventDefault();var e=t.value.trim();""===e?n.innerHTML="":(e="https://api.vvhan.com/api/la.ji?lj="+encodeURIComponent(e),fetch(e).then(e=>e.json()).then(e=>{var t="<div class='result-item'><span class='result-title'>垃圾名称：</span><span class='result-value'>"+e.name+"</span></div>";t+="<div class='result-item'><span class='result-title'>垃圾分类：</span><span class='result-value'>"+e.sort+"</span></div>",n.innerHTML=t}).catch(e=>{console.log(e),n.innerHTML=""}))})})</script><style>body{font-family:Arial,sans-serif;background-color:#f2f2f2;padding:20px}h1{text-align:center;color:#00bfa5}form{display:flex;justify-content:center;margin-bottom:20px}input[type=text]{padding:6px;font-size:16px;border-radius:4px;border:1px solid #ccc}button[type=submit]{padding:6px 12px;font-size:16px;background-color:#00bfa5;color:#fff;border:none;border-radius:4px;cursor:pointer}.result-container{max-width:500px;margin:0 auto;background-color:#fff;border-radius:4px;padding:20px}.result-item{margin-bottom:10px}.result-title{font-weight:700;color:#00bfa5}.result-value{word-break:break-all}</style></html>
