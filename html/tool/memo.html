<!DOCTYPE html><html lang="en"><head><title>备忘录</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css" integrity="sha512-1PKOgIY59xJ8Co8+NE6FZ+LOAZKjy+KY8iq0G4B3CyeY6wYHN3yt9PW0XpSriVlkMXe40PTKnXrLnZ9+fkDaog==" crossorigin="anonymous"><style>*{box-sizing:border-box;outline:0}body{background-color:#7bdaf3;font-family:Poppins,sans-serif;display:flex;flex-wrap:wrap;margin:0;padding-top:3rem}.add{position:fixed;top:1rem;right:1rem;background-color:#9ec862;color:#fff;border:none;border-radius:3px;padding:.5rem 1rem;cursor:pointer}.add:active{transform:scale(.98)}.note{background-color:#fff;box-shadow:0 0 10px 4px rgba(0,0,0,.1);margin:30px 20px;height:400px;width:400px;overflow-y:scroll}.note .tools{background-color:#9ec862;display:flex;justify-content:flex-end;padding:.5rem}.note .tools button{background-color:transparent;border:none;color:#fff;cursor:pointer;font-size:1rem;margin-left:.5rem}.note textarea{outline:0;font-family:inherit;font-size:1.2rem;border:none;height:400px;width:100%;padding:20px}.main{padding:20px}.hidden{display:none}</style><title>Notes App</title></head><body><button class="add" id="add"><i class="fas fa-plus"></i> Add note</button><script src="https://cdnjs.cloudflare.com/ajax/libs/marked/1.2.2/marked.min.js"></script><script>const addBtn=document.getElementById("add"),notes=JSON.parse(localStorage.getItem("notes"));function addNewNote(e=""){const t=document.createElement("div");t.classList.add("note"),t.innerHTML=`
    <div class="tools">
        <button class="edit"><i class="fas fa-edit"></i></button>
        <button class="delete"><i class="fas fa-trash-alt"></i></button>
    </div>
    <div class="main ${e?"":"hidden"}"></div>
    <textarea class="${e?"hidden":""}"></textarea>
    `;var a=t.querySelector(".edit"),d=t.querySelector(".delete");const n=t.querySelector(".main"),s=t.querySelector("textarea");s.value=e,n.innerHTML=marked(e),d.addEventListener("click",()=>{t.remove(),updateLS()}),a.addEventListener("click",()=>{n.classList.toggle("hidden"),s.classList.toggle("hidden")}),s.addEventListener("input",e=>{e=e.target.value;n.innerHTML=marked(e),updateLS()}),document.body.appendChild(t)}function updateLS(){var e=document.querySelectorAll("textarea");const t=[];e.forEach(e=>t.push(e.value)),localStorage.setItem("notes",JSON.stringify(t))}notes&&notes.forEach(e=>addNewNote(e)),addBtn.addEventListener("click",()=>addNewNote())</script></body></html>
