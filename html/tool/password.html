<!DOCTYPE html><html lang="en"><head><title>密码生成器</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head><body><div class="container"><h2>密码生成器</h2><div class="result-container"><span id="result"></span> <button class="btn" id="clipboard">复制</button></div><div class="settings"><div class="setting"><label>密码长度</label> <input type="number" id="length" min="4" max="20" value="20"></div><div class="setting"><label>大写字母</label> <input type="checkbox" id="uppercase" checked="checked"></div><div class="setting"><label>小写字母</label> <input type="checkbox" id="lowercase" checked="checked"></div><div class="setting"><label>数字</label> <input type="checkbox" id="numbers" checked="checked"></div><div class="setting"><label>符号</label> <input type="checkbox" id="symbols" checked="checked"></div></div><button class="btn btn-large" id="generate">生成密码</button></div></body><script>const resultEl=document.getElementById("result"),lengthEl=document.getElementById("length"),uppercaseEl=document.getElementById("uppercase"),lowercaseEl=document.getElementById("lowercase"),numbersEl=document.getElementById("numbers"),symbolsEl=document.getElementById("symbols"),generateEl=document.getElementById("generate"),clipboardEl=document.getElementById("clipboard"),randomFunc={lower:getRandomLower,upper:getRandomUpper,number:getRandomNumber,symbol:getRandomSymbol};function generatePassword(e,t,r,n,o){let l="";var a=e+t+r+n,m=[{lower:e},{upper:t},{number:r},{symbol:n}].filter(e=>Object.values(e)[0]);if(0===a)return"";for(let e=0;e<o;e+=a)m.forEach(e=>{e=Object.keys(e)[0];l+=randomFunc[e]()});return l.slice(0,o)}function getRandomLower(){return String.fromCharCode(Math.floor(26*Math.random())+97)}function getRandomUpper(){return String.fromCharCode(Math.floor(26*Math.random())+65)}function getRandomNumber(){return String.fromCharCode(Math.floor(10*Math.random())+48)}function getRandomSymbol(){var e="!@#$%^&*(){}[]=<>/,.";return e[Math.floor(Math.random()*e.length)]}clipboardEl.addEventListener("click",()=>{var e=document.createElement("textarea"),t=resultEl.innerText;t&&(e.value=t,document.body.appendChild(e),e.select(),document.execCommand("copy"),e.remove(),alert("密码已复制到剪贴板"))}),generateEl.addEventListener("click",()=>{var e=+lengthEl.value,t=lowercaseEl.checked,r=uppercaseEl.checked,n=numbersEl.checked,o=symbolsEl.checked;resultEl.innerText=generatePassword(t,r,n,o,e)})</script><style>*{box-sizing:border-box}body{background-color:#3b3b98;color:#fff;font-family:Muli,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;padding:10px;margin:0}h2{margin:10px 0 20px;text-align:center}.container{background-color:#23235b;box-shadow:0 2px 10px rgba(255,255,255,.2);padding:20px;width:350px;max-width:100%}.result-container{background-color:rgba(0,0,0,.4);display:flex;justify-content:flex-start;align-items:center;position:relative;font-size:18px;letter-spacing:1px;padding:12px 10px;height:50px;width:100%}.result-container #result{word-wrap:break-word;max-width:calc(100% - 40px);overflow-y:scroll;height:100%}#result::-webkit-scrollbar{width:1rem}.result-container .btn{position:absolute;top:5px;right:5px;height:40px;font-size:15px}.btn{border:none;background-color:#3b3b98;color:#fff;font-size:16px;padding:8px 12px;cursor:pointer}.btn-large{display:block;width:100%}.setting{display:flex;justify-content:space-between;align-items:center;margin:15px 0}</style></html>
