v></body><script>const currencyEl_one=document.getElementById("currency-one"),amountEl_one=document.getElementById("amount-one"),currencyEl_two=document.getElementById("currency-two"),amountEl_two=document.getElementById("amount-two"),rateEl=document.getElementById("rate"),swap=document.getElementById("swap");function calculate(){const t=currencyEl_one.value,n=currencyEl_two.value;fetch("https://open.exchangerate-api.com/v6/latest").then(e=>e.json()).then(e=>{e=e.rates[n]/e.rates[t];rateEl.innerText=`1 ${t} = ${e} `+n,amountEl_two.value=(amountEl_one.value*e).toFixed(2)})}currencyEl_one.addEventListener("change",calculate),amountEl_one.addEventListener("input",calculate),currencyEl_two.addEventListener("change",calculate),amountEl_two.addEventListener("input",calculate),swap.addEventListener("click",()=>{var e=currencyEl_one.value;currencyEl_one.value=currencyEl_two.value,currencyEl_two.value=e,calculate()}),calculate()</script><style>:root{--primary-color:#5fbaa7}*{box-sizing:border-box}body{background-color:#f4f4f4;font-family:Arial,Helvetica,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;padding:20px}h1{color:var(--primary-color)}p{text-align:center}.btn{color:#fff;background:var(--primary-color);cursor:pointer;border-radius:5px;font-size:12px;padding:5px 12px}.money-img{width:150px}.currency{padding:40px 0;display:flex;align-items:center;justify-content:space-between}.currency select{padding:10px 20px 10px 10px;-moz-appearance:none;-webkit-appearance:none;appearance:none;border:1px solid #dedede;font-size:16px;background:0 0;background-image:url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%20000002%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4
