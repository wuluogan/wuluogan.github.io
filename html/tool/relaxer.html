<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>放松呼吸</title></head><body><h1>放松呼吸</h1><div class="container" id="container"><div class="circle"></div><p id="text"></p><div class="pointer-container"><span class="pointer"></span></div><div class="gradient-circle"></div></div></body><script>const container=document.getElementById("container"),text=document.getElementById("text"),totalTime=7500,breatheTime=totalTime/5*2,holdTime=totalTime/5;function breathAnimation(){text.innerText="吸气!",container.className="container grow",setTimeout(()=>{text.innerText="闭气",setTimeout(()=>{text.innerText="呼气!",container.className="container shrink"},holdTime)},breatheTime)}breathAnimation(),setInterval(breathAnimation,totalTime)</script><style>@import url(https://fonts.googleapis.com/css?family=Montserrat&display=swap);*{box-sizing:border-box}body{background:#224941 url(img/bg.jpg) no-repeat center center/cover;color:#fff;font-family:Montserrat,sans-serif;min-height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;margin:0}.container{display:flex;align-items:center;justify-content:center;margin:auto;height:300px;width:300px;position:relative;transform:scale(1)}.circle{background-color:#010f1c;height:100%;width:100%;border-radius:50%;position:absolute;top:0;left:0;z-index:-1}.gradient-circle{background:conic-gradient(#55b7a4 0,#4ca493 40%,#fff 40%,#fff 60%,#336d62 60%,#2a5b52 100%);height:320px;width:320px;z-index:-2;border-radius:50%;position:absolute;top:-10px;left:-10px}.pointer{background-color:#fff;border-radius:50%;height:20px;width:20px;display:block}.pointer-container{position:absolute;top:-40px;left:140px;width:20px;height:190px;animation:rotate 7.5s linear forwards infinite;transform-origin:bottom center}@keyframes rotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}.container.grow{animation:grow 3s linear forwards}@keyframes grow{from{transform:scale(1)}to{transform:scale(1.2)}}.container.shrink{animation:shrink 3s linear forwards}@keyframes shrink{from{transform:scale(1.2)}to{transform:scale(1)}}</style></html>
