<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Scroll To Reveal Animation</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}body{display:flex;flex-direction:column;justify-content:center;align-items:center;background-color:#111;color:#fff;overflow-x:hidden}section{min-height:100vh;display:flex;justify-content:center;align-items:center}section h2{font-size:8vw;font-weight:500}.container{width:700px;position:relative;top:-200px;display:grid;grid-template-columns:repeat(3,1fr);gap:30px}.container .box{width:200px;height:200px;background-color:#fff;border-radius:10px;position:relative;top:50vh;transition:.5s}.container .box:nth-child(3n+1){transform:translate(-400px,0) scale(0)}.container .box:nth-child(3n+2){transform:translate(0,400px) scale(0)}.container .box:nth-child(3n+3){transform:translate(400px,0) scale(0)}.container .box.active{transform:translate(0,0) scale(1)}@media screen and (max-width:768px){.container{width:300px;gap:15px;top:-300px}.container .box{width:80px;height:80px;top:25vh}.container .box:nth-child(3n+1){transform:translate(-100px,0) scale(0)}.container .box:nth-child(3n+2){transform:translate(0,100px) scale(0)}.container .box:nth-child(3n+3){transform:translate(100px,0) scale(0)}.container .box.active{transform:translate(0,0) scale(1)}}</style></head><body><section><h2>Scroll To Reveal</h2></section><div class="container"></div><script>const randomColor=()=>{var e="1234567890abcdef";let r="#";for(let o=0;o<6;o++){var t=Math.floor(Math.random()*e.length);r+=e.substring(t,t+1)}return r},container=document.querySelector(".container"),fragment=document.createDocumentFragment();for(let o=0;o<60;o++){const g=document.createElement("div");g.style.backgroundColor=randomColor(),g.classList.add("box"),fragment.appendChild(g)}container.appendChild(fragment);const randomColorBlock=document.querySelectorAll(".box"),scrollTrigger=()=>{randomColorBlock.forEach(o=>{o.offsetTop<=window.scrollY?o.classList.add("active"):o.classList.remove("active")})};window.addEventListener("scroll",scrollTrigger)</script></body></html>
