<!DOCTYPE html><html><head><meta charset="utf-8"><title>文字转语音</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background-color:#f5f5f5;font-family:Arial,"Helvetica Neue",Helvetica,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh}.container{background-color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.3);border-radius:4px;overflow:hidden;width:600px;max-width:100%}.header{display:flex;justify-content:space-between;align-items:center;padding:20px;background-color:#008cba;color:#fff;font-size:24px}.header h1{margin:0}.options{display:flex;justify-content:space-around;align-items:center;padding:10px;font-size:18px}label{display:inline-flex;align-items:center}input[type=checkbox],input[type=radio]{margin-right:5px}#text{padding:20px;font-size:18px;line-height:1.5;border:none;resize:vertical;min-height:200px}.buttons{display:flex;justify-content:space-between;align-items:center;padding:20px}button{font-size:18px;font-weight:700;color:#fff;background-color:#008cba;border:none;border-radius:4px;padding:10px 20px;cursor:pointer;transition:all .2s ease-in-out}button:hover{background-color:#006d9e}</style></head><body><div class="container"><div class="header"><h1>文字转语音工具</h1><button id="downloadButton" disabled="disabled">下载音频</button></div><div class="options"><div><label><input type="radio" name="language" value="zh-CN" checked="checked">中文（中国）</label> <label><input type="radio" name="language" value="en-US">英语（美国）</label></div><div><label><input type="checkbox" id="autoplayCheckbox" checked="checked">自动播放音频</label></div></div><textarea id="text" placeholder="请输入文字"></textarea><div class="buttons"><button onclick="play()">播放</button> <button onclick="stop()">停止</button></div></div><script>const downloadButton=document.getElementById("downloadButton"),textInput=document.getElementById("text"),languageRadios=document.querySelectorAll('input[name="language"]'),autoplayCheckbox=document.getElementById("autoplayCheckbox");let utterance=null;function play(){var e,t=textInput.value.trim();t&&(e=getCheckedLanguage(),(utterance=new SpeechSynthesisUtterance(t)).lang=e,window.speechSynthesis.speak(utterance),autoplayCheckbox.checked)&&(downloadButton.disabled=!1)}function stop(){utterance&&window.speechSynthesis.cancel(utterance),downloadButton.disabled=!0}function getCheckedLanguage(){for(var e of languageRadios)if(e.checked)return e.value;return"zh-CN"}function downloadAudio(){var e,t;utterance&&(e=new Blob([new Uint8Array(utterance.audioBuffer)],{type:"audio/mp3"}),e=URL.createObjectURL(e),(t=document.createElement("a")).download="speech.mp3",t.href=e,t.click(),URL.revokeObjectURL(e))}downloadButton.addEventListener("click",downloadAudio)</script></body></html>
