<!DOCTYPE html><html><head><meta charset="utf-8"><title>JS 生成二维码</title></head><body>内容：<input type="text" id="content" value="https://wlg.com"><br><br>尺寸：<input type="text" id="size" value="150"><br><br>背景：<input type="text" id="color" value="#fff"><br><br>前景：<input type="text" id="colorr" value="#000"><br><br><button id="btn">生成二维码</button><br><br><div id="qrcode"></div></body><script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script><script type="text/javascript">let qrcode,content,size,color,colorr;document.getElementById("btn").onclick=function(){content=document.getElementById("content").value,size=document.getElementById("size").value,color=document.getElementById("color").value,colorr=document.getElementById("colorr").value,qrcode&&qrcode.clear(),(qrcode=new QRCode(document.getElementById("qrcode"),{width:size,height:size,colorLight:color,colorDark:colorr})).makeCode(document.getElementById("content").value)}</script></html>
