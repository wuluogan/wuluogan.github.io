<!DOCTYPE html><html lang="en"><head><title>WTodo</title><meta charset="UTF-8"><style>*{box-sizing:border-box}body{background-color:#f5f5f5;color:#444;font-family:Poppins,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0}h1{color:#007bff;font-size:10rem;text-align:center;opacity:.4}form{box-shadow:0 4px 10px rgba(0,0,0,.1);max-width:100%}.input{border:none;color:#444;font-size:2rem;padding:1rem 2rem;display:block;width:100%}.input::placeholder{color:#d5d5d5}.input:focus{outline-color:#6da5fb}.todos{background-color:#fff;padding:0;margin:0;list-style-type:none}.todos li{border-top:1px solid #e5e5e5;cursor:pointer;font-size:1.5rem;padding:1rem 2rem}.todos li.completed{color:#b6b6b6;text-decoration:line-through}small{color:#b5b5b5;margin-top:3rem;text-align:center}</style></head><body><h1>TODO</h1><form id="form"><input type="text" class="input" id="input" placeholder="Enter Your Todo" autocomplete="off"><ul class="todos" id="todos"></ul></form><small>左键单击以切换完成.<br>右键单击删除待办事项</small><script>const form=document.getElementById("form"),input=document.getElementById("input"),todosUL=document.getElementById("todos"),todos=JSON.parse(localStorage.getItem("todos"));function addTodo(t){let e=input.value;if(e=t?t.text:e){const o=document.createElement("li");t&&t.completed&&o.classList.add("completed"),o.innerText=e,o.addEventListener("click",()=>{o.classList.toggle("completed"),updateLS()}),o.addEventListener("contextmenu",t=>{t.preventDefault(),o.remove(),updateLS()}),todosUL.appendChild(o),input.value="",updateLS()}}function updateLS(){todosEl=document.querySelectorAll("li");const e=[];todosEl.forEach(t=>{e.push({text:t.innerText,completed:t.classList.contains("completed")})}),localStorage.setItem("todos",JSON.stringify(e))}todos&&todos.forEach(t=>addTodo(t)),form.addEventListener("submit",t=>{t.preventDefault(),addTodo()})</script></body></html>
