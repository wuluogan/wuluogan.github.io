<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>查IP</title></head><body><div class="container"><h1>IP信息归属地查询</h1><form id="ipForm"><input type="text" id="ipInput" placeholder="请输入要查询的IP地址" required> <button type="submit">查询</button></form><pre id="result"></pre></div></body><script src="http://pv.sohu.com/cityjson?ie=utf-8"></script><script>console.log("得到的本地IP :"+returnCitySN.cip+"  "+returnCitySN.cname);var ipForm=document.getElementById("ipForm"),ipInput=document.getElementById("ipInput"),result=document.getElementById("result");ipForm.addEventListener("submit",function(t){t.preventDefault();t=ipInput.value.trim();""===t?alert("请输入要查询的IP地址"):fetch("https://api.vvhan.com/api/getIpInfo?ip="+t).then(function(t){return t.json()}).then(function(t){var n;t.success?(n=t.info,t="IP: "+t.ip+"\n",t=(t=(t=(t+="所在网络服务商: "+n.lsp+"\n")+"国家: "+n.country+"\n")+"省份/直辖市: "+n.prov+"\n")+"城市: "+n.city+"\n",result.textContent=t):result.textContent="查询失败，请检查输入的IP地址"}).catch(function(t){console.log("请求发生错误",t),result.textContent="查询失败，请检查网络连接"})})</script><style>body{background-color:#f5f5f5;font-family:Arial,sans-serif}.container{max-width:600px;margin:50px auto;padding:20px;background-color:#fff;border-radius:4px;box-shadow:0 2px 5px rgba(0,0,0,.1)}h1{text-align:center;margin-bottom:20px}form{display:flex;align-items:center;justify-content:center;margin-bottom:20px}input[type=text]{width:200px;padding:10px;font-size:16px;border:1px solid #ccc;border-radius:4px;outline:0}button{padding:10px 20px;font-size:16px;background-color:#4caf50;color:#fff;border:none;border-radius:4px;cursor:pointer;outline:0}pre{background-color:#f5f5f5;padding:10px;border-radius:4px}</style></html>
