<!DOCTYPE html><html><head><meta charset="UTF-8"><title>小记</title></head><body><h1>小记</h1><p>输入笔记内容（长按选择内容可以分享）:</p><textarea id="noteInput"></textarea><br><br><button id="addNoteBtn">添加笔记</button><br><br><ul id="notesList"></ul></body><script>const noteInput=document.getElementById("noteInput"),addNoteBtn=document.getElementById("addNoteBtn"),notesList=document.getElementById("notesList");let notes=[];function loadNotes(){var t=localStorage.getItem("notes");if(t)for(const e of notes=JSON.parse(t))addNoteToList(e)}function saveNotes(){localStorage.setItem("notes",JSON.stringify(notes))}function addNoteToList(t){const e=document.createElement("li");e.className="noteItem",e.innerHTML=`
                <p>${t}</p>
                <button>删除</button>
            `,e.querySelector("button").addEventListener("click",function(){notesList.removeChild(e),notes.splice(notes.indexOf(t),1),saveNotes()}),notesList.appendChild(e)}addNoteBtn.addEventListener("click",function(){var t=noteInput.value.trim();t&&(notes.push(t),addNoteToList(t),saveNotes(),noteInput.value="")}),loadNotes()</script><style>body{font-family:Arial,sans-serif;margin:30px}h1{text-align:center}p{margin-bottom:10px}textarea{width:100%;height:100px;padding:5px;border-radius:5px;border:1px solid #ccc}button{padding:8px 16px;background-color:#4caf50;color:#fff;border:none;border-radius:4px;cursor:pointer}button:hover{background-color:#45a049}ul{list-style:none;padding:0;margin:0}.noteItem{margin-bottom:10px;padding:10px;background-color:#f2f2f2;border-radius:5px}.noteItem p{margin:0}.noteItem button{float:right;background-color:#f44336}.noteItem button:hover{background-color:#d32f2f}</style></html>
