<!DOCTYPE html><html><head><meta charset="UTF-8"><title>二维码生成工具</title></head><body><h1>二维码生成工具</h1><div class="qr-code-generator"><label>输入内容：</label> <input type="text" id="content"> <button onclick="generateQRCode()">生成二维码</button><div id="qrCode" class="qr-code"></div><div id="hintBox" class="hint-box">长按图片可以保存/分享</div></div></body><script>function generateQRCode(){var e=document.getElementById("content"),t=document.getElementById("qrCode"),n=document.getElementById("hintBox"),e=e.value,e="https://api.vvhan.com/api/qr?text="+encodeURIComponent(e),o=document.createElement("img");o.src=e,t.innerHTML="",t.appendChild(o),n.style.display="block"}</script><style>body{background-color:#f2f2f2;margin:0;padding:20px}h1{text-align:center;color:#333}.qr-code-generator{max-width:400px;margin:0 auto;background-color:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 5px rgba(0,0,0,.1);text-align:center}label{display:block;margin-bottom:10px;color:#555}input[type=text]{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:16px}.qr-code{margin-top:20px;text-align:center}.qr-code img{max-width:200px}.hint-box{background-color:#f2f2f2;padding:10px;text-align:center;margin-top:10px}button{background-color:#4caf50;color:#fff;border:none;border-radius:4px;padding:10px 20px;font-size:16px;cursor:pointer}button:hover{background-color:#45a049}</style></html>
