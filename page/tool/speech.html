<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>文本阅读</title><style>*{box-sizing:border-box}body{background:#ffefea;font-family:Lato,sans-serif;min-height:100vh;margin:0}h1{text-align:center}.container{margin:auto;padding:20px}.btn{cursor:pointer;background-color:#e9967a;border:0;border-radius:4px;color:#fff;font-size:16px;padding:8px}.btn:active{transform:scale(.98)}.btn:focus,select:focus{outline:0}.btn-toggle{display:block;margin:auto;margin-bottom:20px}.text-box{width:70%;position:absolute;top:30%;left:50%;transform:translate(-50%,-800px);background-color:#333;color:#fff;padding:20px;border-radius:5px;transition:all 1s ease-in-out}.text-box.show{transform:translate(-50%,0)}.text-box select{background-color:#e9967a;border:0;color:#fff;font-size:12px;height:30px;width:100%}.text-box textarea{border:1px #dadada solid;border-radius:4px;font-size:16px;padding:8px;margin:15px 0;width:100%;height:150px}.text-box .btn{width:100%}.text-box .close{float:right;text-align:right;cursor:pointer}main{display:grid;grid-template-columns:repeat(4,1fr);grid-gap:10px}.box{box-shadow:0 2px 10px rgba(0,0,0,.2);border-radius:5px;cursor:pointer;display:flex;flex-direction:column;overflow:hidden;transition:box-shadow .2s ease-out}.box.active{box-shadow:0 0 10px 5px #e9967a}.box img{width:100%;object-fit:cover;height:200px}.box .info{background-color:#e9967a;color:#fff;font-size:18px;letter-spacing:1px;text-transform:uppercase;margin:0;padding:10px;text-align:center;height:100%}@media (max-width:1100px){main{grid-template-columns:repeat(3,1fr)}}@media (max-width:760px){main{grid-template-columns:repeat(2,1fr)}}@media (max-width:500px){main{grid-template-columns:1fr}}</style></head><body><div class="container"><h1>语音文本阅读器</h1><button id="toggle" class="btn btn-toggle">切换文本框</button><div id="text-box" class="text-box"><div id="close" class="close">X</div><h3>选择语音</h3><select id="voices"></select> <textarea id="text" placeholder="Enter text to read..."></textarea> <button class="btn" id="read">阅读文本</button></div><main></main></div><script>const main=document.querySelector("main"),voicesSelect=document.getElementById("voices"),textarea=document.getElementById("text"),readBtn=document.getElementById("read"),toggleBtn=document.getElementById("toggle"),closeBtn=document.getElementById("close"),data=[{text:"我口渴了"},{text:"我饿了"},{text:"我累了"},{text:"我受伤了"},{text:"我很高兴"},{text:"我很生气"},{text:"我很难过"},{text:"我害怕"},{text:"我想出去"},{text:"我想回家"},{text:"我想上学"},{text:"我想去找奶奶"}];function createBox(e){const t=document.createElement("div"),s=e["text"];t.classList.add("box"),t.innerHTML=`
    <p class="info">${s}</p>
  `,t.addEventListener("click",()=>{setTextMessage(s),speakText(),t.classList.add("active"),setTimeout(()=>t.classList.remove("active"),800)}),main.appendChild(t)}data.forEach(createBox);const message=new SpeechSynthesisUtterance;let voices=[];function getVoices(){(voices=speechSynthesis.getVoices()).forEach(e=>{var t=document.createElement("option");t.value=e.name,t.innerText=e.name+" "+e.lang,voicesSelect.appendChild(t)})}function setTextMessage(e){message.text=e}function speakText(){speechSynthesis.speak(message)}function setVoice(t){message.voice=voices.find(e=>e.name===t.target.value)}speechSynthesis.addEventListener("voiceschanged",getVoices),toggleBtn.addEventListener("click",()=>document.getElementById("text-box").classList.toggle("show")),closeBtn.addEventListener("click",()=>document.getElementById("text-box").classList.remove("show")),voicesSelect.addEventListener("change",setVoice),readBtn.addEventListener("click",()=>{setTextMessage(textarea.value),speakText()}),getVoices()</script></body></html>
