            }
            for (var k in o) {
                if (new RegExp("(" + k + ")").test(format)) {
                    format = format.replace(RegExp.$1, RegExp.$1.length == 1 ? o[k] : ("00" + o[k]).substr(("" + o[k]).length));
                }
            }
            return format;
        };

<body>
<div id="app">
    <div id="date">2023年10月23日 星期一</div>
    <div id="chineseDate">癸卯 兔年 九月初九</div>
    <div id="time" class="time-font">10:17</div>
    <div class="hr">
        <hr>
    </div>
    <div id="weather">
        <div id="updateTime">10:12</div>
        <div class="weather-info">
            <div class="weather-info-icon">
                <i id="tempIcon" class="qi-100"></i> <span id="tempText">晴</span>
            </div>
            <div class="weather-info-temp" id="temp" onclick="getWeather()">14°</div>
            <div class="weather-info-air" onclick="showUpdateTime()">
                <p id="cityName">北京</p>
                <p>
                    <span id="pm2p5">62</span>
                    <span id="category">良</span>
                </p>
                <p id="todayTemp">8 ~ 22℃</p>
            </div>
        </div>
        <div id="weather-list"><div class="weather-item" style="width: 124px;">    <p>2级</p>    <p>东北风</p></div><div class="weather-item" style="width: 124px;">    <p>64%</p>    <p>相对湿度</p></div><div class="weather-item" style="width: 124px;">    <p>12℃</p>    <p>体感温度</p></div><div class="weather-item" style="width: 124px;">    <p>06:31</p>    <p>日出</p></div><div class="weather-item" style="width: 124px;">    <p>17:27</p>    <p>日落</p></div></div>
        <div class="hrfine"></div>
        <div id="weather-day">

        </div>
        </div>
    <!-- <div style="padding: 20px 40px 0 40px;" onclick="switchChineseFamous()">
        <i class="qi-100"></i>
        <span id="chinasfamous">死猪不怕开水烫。</span>
    </div> -->
</div>
<script>
    /**
     * 字体大小
     */
    var dateFontSize = getUrlParam("fs");
    if (dateFontSize) {
        document.getElementsByTagName("html")[0].style.fontSize = dateFontSize + 'px';
    }

    /**
     * 处理时区
     * 默认东八区北京时间
     */
    var utc = getUrlParam("t");
    //utc为时区参数  默认东八区北京时间
    if (!utc) {
        utc = 8;
    }

    function getDate() {
        var currTime = new Date();
        var time = currTime.getTime();
        var offset = currTime.getTimezoneOffset() * 60000; //本地时间与GMT时间差值
        var utcTime = time + offset;  //格林尼治时间

        //格林尼治时间和当前时区差值
        return new Date(utcTime + 3600000 * utc);
    }

    // /**
    //  * 每日一句名言
    //  */
    // function switchChineseFamous() {
    //     var random = Math.round(Math.random() * 224)
    //     document.getElementById("chinasfamous").innerText = Chinasfamous[random];
    // }

    /**
     * 初始化
     */
    function init() {
        // 公历日期
        document.getElementById("date").innerText = getDate().Format("yyyy年M月dd日 星期w");
        // 农历日期
        var chineseDate = calendar.solar2lunar();
        document.getElementById("chineseDate").innerText =
            chineseDate.gzYear + " " + chineseDate.Animal + "年 " + chineseDate.IMonthCn + chineseDate.IDayCn;
        // // 每日一句名言
        // switchChineseFamous();
    }

    init();

    /**
     * 动态时间
     */
    var time = getDate().Format("HH:mm");
    document.getElementById("time").innerText = time;
    var day = getDate().getDay();
    // 每秒执行一次
    setInterval(function () {
        var newTime = getDate().Format("HH:mm");
        var newDay = getDate().getDay();

        // 刷新时间
        if (time !== newTime) {
            time = newTime;
            document.getElementById("time").innerText = newTime;
        }

        // 刷新日期
        if (day !== newDay) {
            day = newDay;
            init();
            getWeather();
        }
    }, 1000);

    /**
     * 天气城市
     * 从url获取城市，默认北京
     */
    var cityName = getUrlParam("city");
    var locationId = "101010100";
    if (cityName != null && cityName !== "") {
        // 获取城市ID
        locationId = cityName;
        getQweather("https://geoapi.qweather.com/v2/city/lookup", function (data) {
            document.getElementById("cityName").innerText = data.location[0].name;
            locationId = data.location[0].id;
            getWeather();
        });
    } else {
        document.getElementById("cityName").innerText = "北京";
        getWeather();
    }

    /**
     * 处理天气
     */
    // 和风天气接口
    function getQweather(url, fun) {
        var key = getUrlParam("key");
        if (key == null || key === '') {
            key = "ff386c2ad642452f8afc0bb49041b1f2";
        }
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url + "?location=" + locationId + "&key=" + key, true);
        xhr.send(null);
        xhr.onreadystatechange = function () {
            if (xhr.status === 200 && xhr.readyState === 4) {
                var data = JSON.parse(xhr.response);
                if (data.code == 402) {
                    document.getElementById("todayTemp").innerText = "由于使用人数过多，天气访问超过免费使用次数，你可以充值、升级访问量或等待访问量重置。";
                } else {
                    fun(data);
                }
            }
        }
    }
    function getWeather() {
        // 天气
        getQweather("https://devapi.qweather.com/v7/weather/now", function (data) {
            // console.log("data=",data);
            document.getElementById("temp").innerText = data.now.temp + "°";
            document.getElementById("tempText").innerText = data.now.text;
            document.getElementById("tempIcon").className = "qi-" + data.now.icon;
            document.getElementById("updateTime").innerText = data.updateTime.substring(11, 16);
            document.getElementById("weather-list").innerHTML =
                '<div class="weather-item">' +
                '    <p>' + data.now.windScale + '级</p>' +
                '    <p>' + data.now.windDir + '</p>' +
                '</div>' +
                '<div class="weather-item">' +
                '    <p>' + data.now.humidity + '%</p>' +
                '    <p>相对湿度</p>' +
                '</div>' +
                '<div class="weather-item">' +
                '    <p>' + data.now.feelsLike + '℃</p>' +
                '    <p>体感温度</p>' +
                '</div>';

            // 未来3天
            getQweather("https://devapi.qweather.com/v7/weather/7d", function (data) {
                // console.log("7d_data=",data);
                document.getElementById("todayTemp").innerText = data.daily[0].tempMin + ' ~ ' + data.daily[0].tempMax + '℃';
                document.getElementById("weather-list").innerHTML +=
                    /*'<div class="weather-item">' +
                    '    <p>' + data.daily[0].uvIndex + '</p>' +
                    '    <p>紫外线</p>' +
                    '</div>' +*/
                    '<div class="weather-item">' +
                    '    <p>' + data.daily[0].sunrise + '</p>' +
                    '    <p>日出</p>' +
                    '</div>' +
                    '<div class="weather-item">' +
                    '    <p>' + data.daily[0].sunset + '</p>' +
                    '    <p>日落</p>' +
                    '</div>';

                var width = (document.documentElement.clientHeight || document.body.clientHeight) / 7;
                var items = document.getElementsByClassName("weather-item");
                for (var i = 0; i < items.length; i++) {
                    items[i].style.width = width + 'px';
                }
                dWeather(data);
            });
        });

        // 空气
        getQweather("https://devapi.qweather.com/v7/air/now", function (data) {
            document.getElementById("pm2p5").innerText = data.now.pm2p5;
            document.getElementById("category").innerText = data.now.category;
        });
    }

      function getDay(fxDate) {
          var fxDateStr = fxDate.substr(5,5).replace("-","/");
          if (dayjs().isSame(dayjs(fxDate),'day')){
              return "今天"+ fxDateStr;
          }else if (dayjs().add(1,'day').isSame(dayjs(fxDate),'day')){
              return "明天"+fxDateStr;
          }
          return fxDateStr;
      }

      function dWeather(data){
          var dWeatherHtml = "";
          for (i = 0; i < data.daily.length; i++) {
              console.log(data.daily[i]);
              var daily = data.daily[i];
              dWeatherHtml += '<div class="weather-item" style="width: 14.2%;">\n' +
                  '                <p>'+getDay(daily.fxDate)+'</p>\n' +
                  '                <p><i class="qi-'+daily.iconDay+'"></i> <span id="tempText">'+daily.textDay+'</span></p>\n' +
                  '                <p>'+daily.tempMin+'~'+daily.tempMax+'℃</p>\n' +
                  '            </div>'
          }
          document.getElementById("weather-day").innerHTML = dWeatherHtml;
      }

      // 显示天气更新时间
      function showUpdateTime() {
          if (document.getElementById("updateTime").style.display === "block") {
              document.getElementById("updateTime").style.display = "none";
          } else {
              document.getElementById("updateTime").style.display = "block";
          }
      }

    // 每60分钟更新一次天气和格言
    setInterval(function () {
        getWeather();
        switchChineseFamous();
    }, 1000 * 60 * 60)
</script>

</body></html>
